name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - run: rustup update stable && rustup target add wasm32v1-none
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - name: Check markdown links
        run: npx -y markdown-link-check -q README.md docs/architecture.md docs/integrations.md docs/mainnet.md
      - run: cargo build --release --target wasm32v1-none -p tributary-splitter

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - run: rustup update stable && rustup component add llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run tests with coverage
        run: cargo llvm-cov -p tributary-splitter --lcov --output-path lcov.info
      - name: Build coverage summary
        run: |
          cargo llvm-cov report --json --summary-only --output-path coverage.json
          lines=$(jq -r '.data[0].totals.lines.percent' coverage.json)
          functions=$(jq -r '.data[0].totals.functions.percent' coverage.json)
          regions=$(jq -r '.data[0].totals.regions.percent' coverage.json)
          {
            echo "## Contract coverage: tributary-splitter"
            echo ""
            echo "| Metric | Coverage |"
            echo "| ------ | -------- |"
            printf '| Lines | %.2f%% |\n' "$lines"
            printf '| Functions | %.2f%% |\n' "$functions"
            printf '| Regions | %.2f%% |\n' "$regions"
          } > coverage-summary.md
          cat coverage-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: contract-coverage
          path: coverage-summary.md
      - name: Upload lcov report
        uses: actions/upload-artifact@v4
        with:
          name: contract-coverage-lcov
          path: lcov.info

  contract-pedantic:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - run: rustup update stable && rustup target add wasm32v1-none
      - run: cargo clippy --all-targets -- -W clippy::pedantic

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm install && npm run build
        working-directory: sdk
      - run: npm install && npm run build
        working-directory: app
